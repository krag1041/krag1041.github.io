<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>YouTubeリンク集</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#f5f5f5;
}

#category{
    display:flex;
    background:#ffffff;
    border-bottom:1px solid #ccc;
    position:sticky;
    top:0;
}

#category button{
    flex:1;
    padding:15px;
    border:none;
    background:#fff;
    font-size:16px;
}

#category button.active{
    background:#d32f2f;
    color:#fff;
}

main{
    padding:15px;
}

.card{
    background:#fff;
    border-radius:10px;
    margin-bottom:12px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.card a{
    display:block;
    padding:18px;
    text-decoration:none;
    color:#333;
    font-size:18px;
}

.card small{
    display:block;
    color:#777;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="category"></div>

<main>
    <div id="links"></div>
</main>

<script>

const data={

"前期":[
    {
        title:"第1回 オリエンテーション",
        url:"https://www.youtube.com/watch?v=xxxxxxxx"
    },
    {
        title:"第2回 基礎講義",
        url:"https://www.youtube.com/watch?v=yyyyyyyy"
    },
    {
        title:"第3回 演習",
        url:"https://www.youtube.com/watch?v=zzzzzzzz"
    }
],

"後期":[
    {
        title:"第1回 応用編",
        url:"https://www.youtube.com/watch?v=aaaaaaaa"
    },
    {
        title:"第2回 実践",
        url:"https://www.youtube.com/watch?v=bbbbbbbb"
    }
],

"その他":[
    {
        title:"補足資料",
        url:"https://www.youtube.com/watch?v=cccccccc"
    },
    {
        title:"Q&A",
        url:"https://www.youtube.com/watch?v=dddddddd"
    }
]

};

const category=document.getElementById("category");
const links=document.getElementById("links");

function show(name){

    links.innerHTML="";

    data[name].forEach(item=>{

        links.innerHTML+=`
        <div class="card">
            <a href="${item.url}" target="_blank">
                📺 ${item.title}
                <small>YouTubeを見る</small>
            </a>
        </div>
        `;
    });

    document.querySelectorAll("#category button").forEach(btn=>{
        btn.classList.remove("active");
        if(btn.textContent===name){
            btn.classList.add("active");
        }
    });
}

Object.keys(data).forEach((name,i)=>{

    const btn=document.createElement("button");
    btn.textContent=name;
    btn.onclick=()=>show(name);

    if(i==0) btn.classList.add("active");

    category.appendChild(btn);
});

show("前期");

</script>

</body>
</html>
