    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#fff;
    color:#222;
}

/* カテゴリ */
#category{
    position:sticky;
    top:0;
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    background:#fff;
    border-bottom:2px solid #2e7d32;
    scrollbar-width:none;
}

#category::-webkit-scrollbar{
    display:none;
}

#category button{
    flex:none;
    border:none;
    background:#fff;
    color:#2e7d32;
    padding:14px 22px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#category button.active{
    background:#2e7d32;
    color:#fff;
}

/* メイン */
main{
    padding:16px;
}

/* リンクカード */
.card{
    border:1px solid #ddd;
    border-left:6px solid #2e7d32;
    border-radius:8px;
    margin-bottom:7px;
    overflow:hidden;
}

.card a{
    display:block;
    padding:6px;
    color:#222;
    text-decoration:none;
}

.card a:hover{
    background:#f6f6f6;
}

.title{
    font-size:15px;
    font-weight:bold;
}

.score{
    font-size:15px;
}

.desc{
    margin-top:1px;
    color:#2e7d32;
    font-size:10px;
}
</style>
</head>

const category=document.getElementById("category");
const links=document.getElementById("links");

function show(name){

    links.innerHTML="";

    data[name].forEach(item=>{

        links.innerHTML+=`
        <div class="card">
            <a href="${item.url}" target="_blank">
                <div class="title">${item.title}</div>
                <div class="score">${item.score}</div>
                <div class="desc">▶ YouTubeで見る</div>
            </a>
        </div>
        `;

    });

    document.querySelectorAll("#category button").forEach(btn=>{
        btn.classList.toggle("active",btn.textContent===name);
    });

}

Object.keys(data).forEach((name,index)=>{

    const btn=document.createElement("button");
    btn.textContent=name;
    btn.onclick=()=>show(name);

    category.appendChild(btn);

    if(index===0){
        btn.classList.add("active");
    }

});

show(Object.keys(data)[0]);
