<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTubeリンク集</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#fff;
    color:#222;
}

/* カテゴリ */
#category{
    position:sticky;
    top:0;
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    background:#fff;
    border-bottom:2px solid #2e7d32;
    scrollbar-width:none;
}

#category::-webkit-scrollbar{
    display:none;
}

#category button{
    flex:none;
    border:none;
    background:#fff;
    color:#2e7d32;
    padding:14px 22px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#category button.active{
    background:#2e7d32;
    color:#fff;
}

/* メイン */
main{
    padding:16px;
}

/* リンクカード */
.card{
    border:1px solid #ddd;
    border-left:6px solid #2e7d32;
    border-radius:8px;
    margin-bottom:2px;
    overflow:hidden;
}

.card a{
    display:block;
    padding:18px;
    color:#222;
    text-decoration:none;
}

.card a:hover{
    background:#f6f6f6;
}

.title{
    font-size:15px;
    font-weight:bold;
}

.score{
    font-size:15px;
}

.desc{
    margin-top:1px;
    color:#2e7d32;
    font-size:10px;
}
</style>
</head>

<body>

<div id="category"></div>

<main>
    <div id="links"></div>
</main>

<script>

const data={

"U-12リーグ2026":[
{

url:"https://youtu.be/J-uYZH1ANzo"
},
{
title:"2026.4.18 前期 第1節 vsフリーダム",
url:"https://youtu.be/hW2c1zHZqbI"
},
{
title:"2026.4.25 前期 第2節 vs豊照",
url:"https://youtu.be/FC7wHahmfrM"
},
{
title:"2026.4.25 前期 第2節 vsUNITE新潟2nd",
url:"https://youtu.be/m7jKECDqk5c"
},
{
title:"2026.4.29 前期 第3節 vs青山",
url:"https://youtu.be/Y7FWLr7XbSw"
},
{
title:"2026.4.29 前期 第3節 vs女池",

},
{
title:"2026.5.6 前期 第4節 vs浜浦",
url:"https://youtu.be/vW9tHZgRUH4"
},
{
title:"2026.5.10 前期 第5節 vs早通",
url:"https://youtu.be/8d43PvAecZA"
},
{
title:"2026.5.10 前期 第5節 vs佐渡",
url:"https://youtu.be/586M2g7797o"

title:"2026.5.31 後期 第1節 vs白根ジャガーズ",

"その他":[

}
],

"ゴール集":[
{
title:"補足動画",
url:"https://www.youtube.com/"
},
{
title:"Q&A",
url:"https://www.youtube.com/"
}
]

};

const category=document.getElementById("category");
const links=document.getElementById("links");

function show(name){

    links.innerHTML="";

    data[name].forEach(item=>{

        links.innerHTML+=`
        <div class="card">
            <a href="${item.url}" target="_blank">
                <div class="title">${item.title}</div>
                <div class="score">${item.score}</div>
                <div class="desc">▶ YouTubeで見る</div>
            </a>
        </div>
        `;

    });

    document.querySelectorAll("#category button").forEach(btn=>{
        btn.classList.toggle("active",btn.textContent===name);
    });

}

Object.keys(data).forEach((name,index)=>{

    const btn=document.createElement("button");
    btn.textContent=name;
    btn.onclick=()=>show(name);

    category.appendChild(btn);

    if(index===0){
        btn.classList.add("active");
    }

});

show(Object.keys(data)[0]);

</script>

</body>
</html>
