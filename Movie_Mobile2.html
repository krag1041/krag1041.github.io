<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTubeリンク集</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#fff;
    color:#222;
}

/* カテゴリ */
#category{
    position:sticky;
    top:0;
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    background:#fff;
    border-bottom:2px solid #2e7d32;
    scrollbar-width:none;
}

#category::-webkit-scrollbar{
    display:none;
}

#category button{
    flex:none;
    border:none;
    background:#fff;
    color:#2e7d32;
    padding:14px 22px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#category button.active{
    background:#2e7d32;
    color:#fff;
}

/* メイン */
main{
    padding:16px;
}

/* リンクカード */
.card{
    border:1px solid #ddd;
    border-left:6px solid #2e7d32;
    border-radius:8px;
    margin-bottom:14px;
    overflow:hidden;
}

.card a{
    display:block;
    padding:18px;
    color:#222;
    text-decoration:none;
}

.card a:hover{
    background:#f6f6f6;
}

.title{
    font-size:18px;
    font-weight:bold;
}

.desc{
    margin-top:6px;
    color:#2e7d32;
    font-size:14px;
}
</style>
</head>

<body>

<div id="category"></div>

<main>
    <div id="links"></div>
</main>

<script>

const data={

"U-12前期":[
{
title:"第1回 オリエンテーション",
url:"https://www.youtube.com/"
},
{
title:"第2回 基礎講義",
url:"https://www.youtube.com/"
},
{
title:"第3回 演習",
url:"https://www.youtube.com/"
}
],

"後期":[
{
title:"第1回 応用編",
url:"https://www.youtube.com/"
},
{
title:"第2回 実践編",
url:"https://www.youtube.com/"
}
],

"その他":[
{
title:"補足動画",
url:"https://www.youtube.com/"
},
{
title:"Q&A",
url:"https://www.youtube.com/"
}
]

};

const category=document.getElementById("category");
const links=document.getElementById("links");

function show(name){

    links.innerHTML="";

    data[name].forEach(item=>{

        links.innerHTML+=`
        <div class="card">
            <a href="${item.url}" target="_blank">
                <div class="title">${item.title}</div>
                <div class="desc">▶ YouTubeで見る</div>
            </a>
        </div>
        `;

    });

    document.querySelectorAll("#category button").forEach(btn=>{
        btn.classList.toggle("active",btn.textContent===name);
    });

}

Object.keys(data).forEach((name,index)=>{

    const btn=document.createElement("button");
    btn.textContent=name;
    btn.onclick=()=>show(name);

    category.appendChild(btn);

    if(index===0){
        btn.classList.add("active");
    }

});

show(Object.keys(data)[0]);

</script>

</body>
</html>
