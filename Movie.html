<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>左メニュー・右コンテンツサンプル</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: sans-serif;
        }

        /* 左ペイン（リスト・メニュー） */
        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            border-right: 1px solid #ccc;
            padding: 20px 0;
            overflow-y: auto;
        }
        .sidebar h2 {
            padding: 0 20px;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li a {
            display: block;
            padding: 15px 20px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
        }
        .sidebar li a:hover {
            background-color: #e0e0e0;
        }

        /* 右ペイン（各ページ表示領域） */
        .content {
            flex: 1;
            height: 100%;
        }
        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- 左ペイン：リスト -->
    <nav class="sidebar">
        <h2>メニュー</h2>
        <ul>
            <li><a href="league2026E.html" target="main-frame">2026U-12リーグ戦 前期</a></li>
            <li><a href="league2026L.html" target="main-frame">2026U-12リーグ戦 後期</a></li>
            <li><a href="etc.html" target="main-frame">その他</a></li>
        </ul>
    </nav>

    <!-- 右ペイン：各ページ表示領域 -->
    <main class="content">
        <!-- 初期表示するページ（例: page1.html） -->
        <iframe src="league2026L.html" name="main-frame"></iframe>
    </main>

</body>
</html>
